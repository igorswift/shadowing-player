<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shadowing Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --surface: #14141f; --surface2: #1e1e2e;
    --accent: #6ee7b7; --accent-dim: #2d4a3e;
    --red: #f87171; --red-dim: #4a2d2d;
    --orange: #fb923c; --orange-dim: #4a3a2d;
    --purple: #a78bfa; --purple-dim: #3d2d5e;
    --text: #e8e8ed; --text-dim: #6b6b7b; --text-muted: #3a3a4a;
    --radius: 16px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* Setup */
  .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; padding: 24px; gap: 20px; }
  .setup-screen h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
  .setup-screen p { color: var(--text-dim); font-size: 14px; text-align: center; max-width: 320px; line-height: 1.5; }
  .file-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 320px; padding: 24px; border: 2px dashed var(--text-muted); border-radius: var(--radius); background: var(--surface); cursor: pointer; transition: all 0.2s; gap: 8px; }
  .file-btn:hover, .file-btn:active { border-color: var(--accent); background: var(--surface2); }
  .file-btn.loaded { border-color: var(--accent); border-style: solid; }
  .file-btn .icon { font-size: 32px; } .file-btn .label { font-size: 15px; font-weight: 500; }
  .file-btn .status { font-size: 12px; color: var(--text-dim); } .file-btn.loaded .status { color: var(--accent); }
  .start-btn { width: 100%; max-width: 320px; padding: 16px; border: none; border-radius: var(--radius); background: var(--accent); color: var(--bg); font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; opacity: 0.3; pointer-events: none; }
  .start-btn.ready { opacity: 1; pointer-events: auto; } .start-btn:active { transform: scale(0.97); }

  /* History panel */
  .history-panel { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 100; flex-direction: column; padding: 20px 16px; overflow-y: auto; }
  .history-panel.open { display: flex; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .history-header h2 { font-size: 20px; font-weight: 700; color: var(--accent); }
  .history-close { padding: 8px 16px; border: 1px solid var(--text-muted); border-radius: 20px; background: transparent; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; }
  .history-total { background: var(--accent-dim); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .history-total-title { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 8px; font-weight: 500; }
  .history-total-stats { display: flex; gap: 20px; }
  .history-total-stat { display: flex; flex-direction: column; gap: 2px; }
  .history-total-val { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: var(--text); font-weight: 700; }
  .history-total-lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); }
  .history-day { background: var(--surface); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
  .history-day.today { border: 1px solid var(--accent-dim); }
  .history-date { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); font-weight: 500; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .history-date .today-badge { font-size: 10px; background: var(--accent-dim); color: var(--accent); padding: 2px 8px; border-radius: 8px; }
  .history-stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .history-stat { display: flex; flex-direction: column; gap: 2px; }
  .history-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--text); font-weight: 500; }
  .history-stat-lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .history-empty { color: var(--text-muted); font-size: 14px; text-align: center; padding: 40px; }
  .delta-up { color: var(--accent); } .delta-down { color: var(--orange); } .delta-same { color: var(--text-muted); }

  /* Player */
  .player-screen { display: none; flex-direction: column; height: 100dvh; }
  .player-screen.active { display: flex; }

  /* Session bar — always visible */
  .session-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--surface); flex-shrink: 0; cursor: pointer; border-bottom: 1px solid var(--surface2); }
  .session-bar:active { background: var(--surface2); }
  .session-left { display: flex; align-items: center; gap: 12px; }
  .session-timer { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--accent); font-weight: 700; }
  .session-today { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .session-stats { display: flex; gap: 14px; }
  .session-stat { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .session-stat-val { color: var(--text); font-weight: 600; font-size: 14px; }
  .session-stat-lbl { font-size: 9px; color: var(--text-muted); }
  .session-history-btn { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); background: none; border: 1px solid var(--text-muted); border-radius: 10px; padding: 3px 8px; cursor: pointer; }

  .video-wrap { position: relative; width: 100%; flex-shrink: 0; background: #000; }
  .video-wrap video { width: 100%; display: block; max-height: 28dvh; object-fit: contain; background: #000; }
  .video-wrap.audio-mode { background: var(--surface2); display: flex; align-items: center; justify-content: center; min-height: 60px; margin: 0; }
  .video-wrap.audio-mode video { display: none; }
  .audio-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); padding: 12px 16px; }
  .pause-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 8px; opacity: 0; transition: opacity 0.2s; }
  .pause-badge.visible { opacity: 1; }
  .pause-badge.recording { color: var(--red); }
  .pause-badge.shadow { color: var(--purple); }
  .pause-badge.countdown { color: var(--orange); font-size: 18px; font-weight: 700; }

  .toolbar { display: flex; gap: 6px; padding: 8px 16px; flex-shrink: 0; flex-wrap: wrap; align-items: center; }
  .tool-btn { padding: 6px 12px; border: 1px solid var(--text-muted); border-radius: 20px; background: transparent; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tool-btn:active { transform: scale(0.95); }
  .tool-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .tool-btn.rec-active { border-color: var(--red); color: var(--red); background: var(--red-dim); animation: pulse-rec 1.5s infinite; }
  .tool-btn.shadow-active { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); animation: pulse-rec 1.5s infinite; }
  .tool-btn.preparing { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
  .tool-btn.has-rec { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
  @keyframes pulse-rec { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .rec-timer { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--red); margin-left: 2px; }
  .rec-timer.shadow-timer { color: var(--purple); }

  .takes-area { padding: 6px 16px 6px; flex-shrink: 0; background: var(--surface); border-radius: 12px; margin: 4px 16px; }
  .takes-area:empty { display: none; }
  .takes-orig { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); padding: 6px 0 4px; font-weight: 500; }
  .take-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--surface2); }
  .take-row:last-child { border-bottom: none; }
  .take-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); min-width: 110px; font-weight: 500; }
  .take-num .take-type { font-size: 10px; font-weight: 400; }
  .take-num .take-type.rec-type { color: var(--orange); }
  .take-num .take-type.shadow-type { color: var(--purple); }
  .take-time { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); min-width: 44px; font-weight: 500; }
  .take-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; position: relative; overflow: hidden; }
  .take-bar-fill { height: 100%; border-radius: 3px; transition: width 0.1s; }
  .take-bar-fill.rec-fill { background: var(--accent); }
  .take-bar-fill.shadow-fill { background: var(--purple); }
  .take-btn { padding: 5px 14px; border: 1px solid var(--text-dim); border-radius: 12px; background: transparent; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; font-weight: 500; }
  .take-btn:active { background: var(--surface2); }
  .take-btn.playing { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .take-mix-btn { padding: 5px 10px; border: 1px solid var(--purple); border-radius: 12px; background: transparent; color: var(--purple); font-family: 'JetBrains Mono', monospace; font-size: 10px; cursor: pointer; font-weight: 500; }
  .take-mix-btn:active { background: var(--purple-dim); }
  .take-mix-btn.playing { background: var(--purple-dim); }

  .progress-bar { height: 3px; background: var(--surface2); flex-shrink: 0; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

  .phrase-area { flex: 1; display: flex; flex-direction: column; padding: 12px 16px; overflow: hidden; justify-content: center; }
  .phrase-counter { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .phrase-text { font-size: 22px; font-weight: 500; line-height: 1.5; transition: opacity 0.2s; }
  .phrase-text.dimmed { opacity: 0.15; }
  .phrase-time { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  .word { cursor: pointer; transition: color 0.15s; }
  .word:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .split-next { font-size: 22px; font-weight: 500; line-height: 1.5; color: var(--text); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--surface2); }
  .split-next .word:hover { color: var(--accent); }
  .phrase-translation { font-size: 16px; line-height: 1.5; color: var(--text-muted); margin-top: 8px; font-style: italic; }

  .controls { display: flex; gap: 0; padding: 10px 16px 28px; flex-shrink: 0; }
  .ctrl-btn { flex: 1; padding: 14px 4px; border: none; background: var(--surface); color: var(--text); font-family: inherit; font-size: 11px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.15s; border-right: 1px solid var(--bg); }
  .ctrl-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .ctrl-btn:last-child { border-radius: 0 var(--radius) var(--radius) 0; border-right: none; }
  .ctrl-btn:active { background: var(--surface2); transform: scale(0.95); }
  .ctrl-btn .ctrl-icon { font-size: 20px; }
  .ctrl-btn.accent-btn { background: var(--accent-dim); color: var(--accent); }

  @media (min-width: 768px) { .player-screen { max-width: 480px; margin: 0 auto; } .phrase-text { font-size: 26px; } }
  input[type="file"] { display: none; }

  .countdown-bar { display: flex; align-items: center; gap: 8px; padding: 6px 16px; flex-shrink: 0; }
  .countdown-presets { display: flex; gap: 4px; }
  .cd-btn { padding: 5px 10px; border: 1px solid var(--text-muted); border-radius: 14px; background: transparent; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .cd-btn:active { transform: scale(0.95); }
  .cd-btn.cd-running { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .cd-display { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-dim); font-weight: 500; min-width: 50px; }
  .cd-display.cd-warn { color: var(--orange); }
  .cd-display.cd-done { color: var(--red); animation: pulse-rec 1s infinite; }
  .cd-progress { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .cd-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s linear; }
  .cd-progress-fill.cd-warn-fill { background: var(--orange); }
  .cd-progress-fill.cd-done-fill { background: var(--red); }

  /* Prompter */
  .prompter-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 200; flex-direction: column; }
  .prompter-overlay.open { display: flex; }
  .prompter-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; flex-shrink: 0; }
  .prompter-header-left { display: flex; align-items: center; gap: 12px; }
  .prompter-time { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); }
  .prompter-close { padding: 8px 16px; border: 1px solid var(--text-muted); border-radius: 20px; background: transparent; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; }
  .prompter-close:hover { border-color: var(--accent); color: var(--accent); }
  .prompter-mirror-btn { padding: 8px 12px; border: 1px solid var(--text-muted); border-radius: 20px; background: transparent; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; }
  .prompter-mirror-btn.active { border-color: var(--accent); color: var(--accent); }
  .prompter-play-btn { padding: 8px 16px; border: 1px solid var(--accent); border-radius: 20px; background: var(--accent-dim); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; }
  .prompter-body { flex: 1; overflow: hidden; position: relative; }
  .prompter-scroll { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; padding: 40vh 24px 60vh; scroll-behavior: auto; -ms-overflow-style: none; scrollbar-width: none; }
  .prompter-scroll::-webkit-scrollbar { display: none; }
  .prompter-scroll.mirrored { transform: scaleX(-1); }
  .prompter-line { font-family: 'DM Sans', sans-serif; font-size: 32px; font-weight: 500; line-height: 1.5; color: var(--text-muted); padding: 12px 0; transition: color 0.3s, opacity 0.3s; cursor: pointer; }
  .prompter-line.active { color: var(--text); font-size: 36px; }
  .prompter-line.done { color: var(--text-muted); opacity: 0.3; }
  .prompter-line .prompter-translation { display: block; font-size: 20px; font-style: italic; color: var(--text-dim); margin-top: 4px; font-weight: 400; }
  .prompter-line.active .prompter-translation { color: var(--text-muted); }
  .prompter-gradient-top { position: absolute; top: 0; left: 0; right: 0; height: 120px; background: linear-gradient(to bottom, #000 0%, transparent 100%); pointer-events: none; z-index: 1; }
  .prompter-gradient-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 120px; background: linear-gradient(to top, #000 0%, transparent 100%); pointer-events: none; z-index: 1; }
</style>
</head>
<body>

<div class="setup-screen" id="setup">
  <h1>Shadowing Player</h1>
  <p>Load a video or audio file and a transcript JSON to start practicing.</p>
  <div class="file-btn" id="videoPicker" onclick="document.getElementById('videoInput').click()">
    <span class="icon">🎬</span><span class="label">Media file</span><span class="status" id="videoStatus">tap to select .mp4 / .mp3</span>
  </div>
  <input type="file" id="videoInput" accept="video/*,audio/*,.mp3,.m4a,.wav,.ogg">
  <div class="file-btn" id="jsonPicker" onclick="document.getElementById('jsonInput').click()">
    <span class="icon">📝</span><span class="label">Transcript JSON</span><span class="status" id="jsonStatus">tap to select .json</span>
  </div>
  <input type="file" id="jsonInput" accept=".json">
  <button class="start-btn" id="startBtn" onclick="startPlayer()">Start Shadowing</button>
</div>

<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <h2>Practice History</h2>
    <button class="history-close" onclick="closeHistory()">Close</button>
  </div>
  <div id="historyList"></div>
</div>

<div class="player-screen" id="player">
  <div class="session-bar" onclick="openHistory()">
    <div class="session-left">
      <span class="session-timer" id="sessionTimer">00:00</span>
      <span class="session-today" id="sessionDate"></span>
    </div>
    <div class="session-stats">
      <div class="session-stat"><span class="session-stat-val" id="sessionPhrases">0</span><span class="session-stat-lbl">phrases</span></div>
      <div class="session-stat"><span class="session-stat-val" id="sessionRecs">0</span><span class="session-stat-lbl">recs</span></div>
    </div>
    <button class="session-history-btn" onclick="event.stopPropagation(); openHistory()">history</button>
  </div>
  <div class="video-wrap">
    <video id="video" playsinline></video>
    <span class="audio-label" style="display:none"></span>
    <div class="pause-badge" id="pauseBadge">YOUR TURN</div>
  </div>
  <div class="toolbar">
    <button class="tool-btn active" id="speedBtn" onclick="cycleSpeed()">1x</button>
    <button class="tool-btn" id="loopBtn" onclick="toggleLoop()">Loop: off</button>
    <button class="tool-btn" id="recBtn" onclick="handleRec()">Rec</button>
    <button class="tool-btn" id="shadowBtn" onclick="handleShadow()">Shadow</button>
    <button class="tool-btn" id="prompterBtn" onclick="openPrompter()">Prompter</button>
    <button class="tool-btn" id="stopBtn" onclick="stopRecording()" style="display:none">■ Stop</button>
    <span class="rec-timer" id="recTimer" style="display:none"></span>
  </div>
  <div class="countdown-bar">
    <div class="countdown-presets">
      <button class="cd-btn" onclick="toggleCountdown(10)">10m</button>
      <button class="cd-btn" onclick="toggleCountdown(15)">15m</button>
      <button class="cd-btn" onclick="toggleCountdown(20)">20m</button>
    </div>
    <span class="cd-display" id="cdDisplay"></span>
    <div class="cd-progress"><div class="cd-progress-fill" id="cdFill" style="width:0%"></div></div>
  </div>
  <div class="takes-area" id="takesArea"></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="phrase-area">
    <div class="phrase-counter" id="phraseCounter">1 / 189</div>
    <div class="phrase-text" id="phraseText">Loading...</div>
    <div class="split-next" id="splitNext" style="display:none"></div>
    <div class="phrase-translation" id="phraseTranslation" style="display:none"></div>
    <div class="phrase-time" id="phraseTime">00:00</div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" onclick="prevPhrase()"><span class="ctrl-icon">⏮</span>Prev</button>
    <button class="ctrl-btn" onclick="replayPhrase()"><span class="ctrl-icon">🔄</span>Replay</button>
    <button class="ctrl-btn" onclick="togglePause()"><span class="ctrl-icon" id="pauseIcon">⏸</span><span id="pauseLabel">Pause</span></button>
    <button class="ctrl-btn" onclick="toggleText()"><span class="ctrl-icon">👁</span><span id="toggleLabel">Hide</span></button>
    <button class="ctrl-btn" id="ruBtn" onclick="toggleTranslation()"><span class="ctrl-icon">🇷🇺</span><span id="ruLabel">RU</span></button>
    <button class="ctrl-btn" id="splitBtn" onclick="handleSplit()"><span class="ctrl-icon">⛓</span><span id="splitLabel">Split</span></button>
    <button class="ctrl-btn accent-btn" onclick="nextPhrase()"><span class="ctrl-icon">⏭</span>Next</button>
  </div>
</div>

<div class="prompter-overlay" id="prompterOverlay">
  <div class="prompter-header">
    <div class="prompter-header-left">
      <button class="prompter-play-btn" id="prompterPlayBtn" onclick="prompterTogglePlay()">▶ Play</button>
      <button class="prompter-mirror-btn" id="prompterMirrorBtn" onclick="prompterToggleMirror()">Mirror</button>
      <span class="prompter-time" id="prompterTime">0:00</span>
    </div>
    <button class="prompter-close" onclick="closePrompter()">✕ Close</button>
  </div>
  <div class="prompter-body">
    <div class="prompter-gradient-top"></div>
    <div class="prompter-scroll" id="prompterScroll"></div>
    <div class="prompter-gradient-bottom"></div>
  </div>
</div>

<script>
// ===== STATS =====
const STORAGE_KEY = 'shadowing_stats';
function todayKey() { return new Date().toISOString().slice(0, 10); }
function formatDate(key) {
  const d = new Date(key + 'T00:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
function loadStats() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveStats(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function getTodayStats() { const s = loadStats(); return s[todayKey()] || { minutes: 0, seconds: 0, phrases: 0, recs: 0 }; }
function updateTodayStats(u) {
  const s = loadStats(), k = todayKey();
  if (!s[k]) s[k] = { minutes: 0, seconds: 0, phrases: 0, recs: 0 };
  Object.assign(s[k], u);
  saveStats(s);
}

function openHistory() {
  const panel = document.getElementById('historyPanel');
  const list = document.getElementById('historyList');
  const stats = loadStats();
  const days = Object.keys(stats).sort().reverse();

  // Update today's stats before showing
  const sec = getSessionSeconds();
  if (sec > 0) updateTodayStats({ minutes: Math.ceil(sec / 60), seconds: sec, phrases: sessionPhrasesVisited.size, recs: sessionRecCount });

  if (days.length === 0) {
    list.innerHTML = '<div class="history-empty">No practice sessions yet.</div>';
    panel.classList.add('open');
    return;
  }

  // Totals
  let totalMin = 0, totalPhrases = 0, totalRecs = 0;
  days.forEach(d => { totalMin += stats[d].minutes; totalPhrases += stats[d].phrases; totalRecs += stats[d].recs; });

  let html = `
    <div class="history-total">
      <div class="history-total-title">ALL TIME — ${days.length} days</div>
      <div class="history-total-stats">
        <div class="history-total-stat"><div class="history-total-val">${totalMin} min</div><div class="history-total-lbl">TOTAL TIME</div></div>
        <div class="history-total-stat"><div class="history-total-val">${totalPhrases}</div><div class="history-total-lbl">PHRASES</div></div>
        <div class="history-total-stat"><div class="history-total-val">${totalRecs}</div><div class="history-total-lbl">RECS</div></div>
        <div class="history-total-stat"><div class="history-total-val">${Math.round(totalMin / days.length)}</div><div class="history-total-lbl">AVG MIN/DAY</div></div>
      </div>
    </div>
  `;

  html += days.map((day, i) => {
    const d = stats[day];
    const prev = i < days.length - 1 ? stats[days[i + 1]] : null;
    const isToday = day === todayKey();

    function arrow(curr, prevVal) {
      if (!prev || prevVal === undefined) return '';
      const diff = curr - prevVal;
      if (diff === 0) return ' <span class="delta-same">=</span>';
      return diff > 0 ? ` <span class="delta-up">↑${diff}</span>` : ` <span class="delta-down">↓${Math.abs(diff)}</span>`;
    }

    return `<div class="history-day ${isToday ? 'today' : ''}">
      <div class="history-date">
        <span>${formatDate(day)}</span>
        ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
      </div>
      <div class="history-stats">
        <div class="history-stat"><div class="history-stat-val">${d.minutes} min${arrow(d.minutes, prev?.minutes)}</div><div class="history-stat-lbl">TIME</div></div>
        <div class="history-stat"><div class="history-stat-val">${d.phrases}${arrow(d.phrases, prev?.phrases)}</div><div class="history-stat-lbl">PHRASES</div></div>
        <div class="history-stat"><div class="history-stat-val">${d.recs}${arrow(d.recs, prev?.recs)}</div><div class="history-stat-lbl">RECS</div></div>
      </div>
    </div>`;
  }).join('');

  list.innerHTML = html;
  panel.classList.add('open');
}

function closeHistory() { document.getElementById('historyPanel').classList.remove('open'); }

// ===== SESSION =====
let sessionStartTime = null, sessionTimerInterval = null;
let sessionPhrasesVisited = new Set(), sessionRecCount = 0;
let sessionElapsed = 0;

function startSessionTimer() {
  sessionStartTime = Date.now();
  sessionElapsed = 0;
  sessionPhrasesVisited = new Set();
  sessionRecCount = 0;

  document.getElementById('sessionDate').textContent = formatDate(todayKey());

  // Load existing today stats — use seconds if available, fall back to minutes
  const existing = getTodayStats();
  let prevSec = existing.seconds || 0;
  // Sanity: if no seconds field and minutes is absurd (>1440 = 24h), reset today
  if (!existing.seconds && existing.minutes > 1440) { prevSec = 0; updateTodayStats({ minutes: 0, seconds: 0, phrases: 0, recs: 0 }); }
  else if (!existing.seconds && existing.minutes > 0) { prevSec = existing.minutes * 60; }
  // Cap at 24h max per day
  if (prevSec > 86400) prevSec = 0;
  sessionElapsed = prevSec * 1000;
  sessionStartTime = Date.now();

  updateSessionUI();
  sessionTimerInterval = setInterval(updateSessionUI, 1000);
}

function getSessionSeconds() { return Math.floor((sessionElapsed + (Date.now() - sessionStartTime)) / 1000); }

function updateSessionUI() {
  const sec = getSessionSeconds();
  const m = Math.floor(sec / 60), s = sec % 60;
  document.getElementById('sessionTimer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('sessionPhrases').textContent = sessionPhrasesVisited.size;
  document.getElementById('sessionRecs').textContent = sessionRecCount;
  if (sec % 10 === 0) updateTodayStats({ minutes: Math.ceil(sec / 60), seconds: sec, phrases: sessionPhrasesVisited.size, recs: sessionRecCount });
}

function trackPhrase(idx) { sessionPhrasesVisited.add(idx); }
function trackRec() { sessionRecCount++; }

// ===== PLAYER =====
let videoFile = null, sentences = [], currentIndex = 0, textVisible = true, video;
let autoPauseEnabled = true, isPausedByUser = false;
const speeds = [0.75, 1]; let speedIndex = 1;
let loopEnabled = false, loopCount = 0; const LOOP_MAX = 3; const MAX_TAKES = 5;
let splitMode = false, splitEndTime = 0;
let translationVisible = false, hasTranslations = false;
let mediaRecorder = null, recordedChunks = [], micStream = null;
let isRecording = false, recPreparing = false, shadowMode = false;
let recStartTime = 0, recTimerInterval = null;
let takes = [], playingTakeIdx = -1, takeProgressInterval = null, mixPlaying = false;

document.getElementById('videoInput').addEventListener('change', (e) => {
  const f = e.target.files[0]; if (!f) return;
  videoFile = f;
  document.getElementById('videoStatus').textContent = f.name;
  document.getElementById('videoPicker').classList.add('loaded');
  checkReady();
});
document.getElementById('jsonInput').addEventListener('change', (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = (ev) => {
    try { sentences = parseTranscript(JSON.parse(ev.target.result));
      document.getElementById('jsonStatus').textContent = `${sentences.length} phrases`;
      document.getElementById('jsonPicker').classList.add('loaded'); checkReady();
    } catch(err) { document.getElementById('jsonStatus').textContent = 'Error'; }
  };
  r.readAsText(f);
});

function parseTranscript(data) {
  const res = [];
  const translations = data.translations || [];
  let phraseIdx = 0;
  for (const seg of data.segments) {
    let wordTimings = [], start = null;
    for (const w of seg.words) {
      if (w.type !== 'word') continue;
      if (start === null) start = w.start;
      wordTimings.push({ text: w.text, start: w.start, end: w.start + w.duration });
      if (w.eos) {
        const phrase = { start, end: w.start + w.duration, text: wordTimings.map(wt => wt.text).join(' '), words: wordTimings };
        if (translations[phraseIdx]) phrase.translation = translations[phraseIdx];
        phraseIdx++;
        res.push(phrase);
        wordTimings = []; start = null;
      }
    }
    if (wordTimings.length) {
      const lw = seg.words[seg.words.length-1];
      const phrase = { start, end: lw.start + lw.duration, text: wordTimings.map(wt => wt.text).join(' '), words: wordTimings };
      if (translations[phraseIdx]) phrase.translation = translations[phraseIdx];
      phraseIdx++;
      res.push(phrase);
    }
  }
  return res;
}

function checkReady() { if (videoFile && sentences.length) document.getElementById('startBtn').classList.add('ready'); }

function startPlayer() {
  if (!videoFile || !sentences.length) return;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('player').classList.add('active');
  video = document.getElementById('video');
  video.src = URL.createObjectURL(videoFile);
  // Audio mode — hide video element, show filename
  const isAudio = videoFile.type.startsWith('audio/') || /\.(mp3|m4a|wav|ogg|flac)$/i.test(videoFile.name);
  const wrap = document.querySelector('.video-wrap');
  if (isAudio) {
    wrap.classList.add('audio-mode');
    const lbl = wrap.querySelector('.audio-label');
    lbl.textContent = '🎧 ' + videoFile.name;
    lbl.style.display = '';
  }
  video.load();
  startSessionTimer();

  function tick() {
    if (video && !video.paused && autoPauseEnabled && !recPreparing && sentences.length) {
      const endTime = splitMode ? splitEndTime : sentences[currentIndex].end;
      if (video.currentTime >= endTime - 0.12) {
        video.pause();
        if (splitMode) trackPhrase(currentIndex + 1);
        if (isRecording && shadowMode) stopRecording();
        else if (loopEnabled && loopCount < LOOP_MAX - 1) { loopCount++; setTimeout(() => playPhrase(currentIndex), 600); }
        else loopCount = 0;
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  video.addEventListener('pause', () => { if (!recPreparing && !isRecording) setBadge('YOUR TURN', 'visible'); });
  video.addEventListener('play', () => {
    if (!isRecording && !mixPlaying) { hideBadge(); isPausedByUser = false;
      document.getElementById('pauseIcon').textContent = '⏸'; document.getElementById('pauseLabel').textContent = 'Pause'; }
  });

  currentIndex = 0; showPhrase(currentIndex); playPhrase(currentIndex);
  // Show RU button only if translations exist
  hasTranslations = sentences.some(s => s.translation);
  document.getElementById('ruBtn').style.display = hasTranslations ? '' : 'none';
}

function setBadge(t, c) { const b = document.getElementById('pauseBadge'); b.textContent = t; b.className = 'pause-badge ' + c; }
function hideBadge() { document.getElementById('pauseBadge').className = 'pause-badge'; }

function showPhrase(idx) {
  const s = sentences[idx];
  // Clear split mode
  splitMode = false;
  document.getElementById('splitNext').style.display = 'none';
  document.getElementById('splitBtn').classList.remove('accent-btn');
  document.getElementById('splitLabel').textContent = 'Split';

  document.getElementById('phraseCounter').textContent = `${idx + 1} / ${sentences.length}`;
  const phraseEl = document.getElementById('phraseText');
  if (s.words && s.words.length) {
    phraseEl.innerHTML = s.words.map((w, i) =>
      `<span class="word" onclick="seekToWord(${i})">${w.text} </span>`
    ).join('');
  } else {
    phraseEl.textContent = s.text;
  }
  phraseEl.classList.toggle('dimmed', !textVisible);
  // Translation
  const transEl = document.getElementById('phraseTranslation');
  if (s.translation && translationVisible) { transEl.textContent = s.translation; transEl.style.display = ''; }
  else { transEl.style.display = 'none'; }
  const sm = Math.floor(s.start/60), ss = Math.floor(s.start%60), em = Math.floor(s.end/60), es = Math.floor(s.end%60);
  document.getElementById('phraseTime').textContent = `${sm}:${String(ss).padStart(2,'0')} → ${em}:${String(es).padStart(2,'0')}`;
  document.getElementById('progressFill').style.width = ((idx+1)/sentences.length*100)+'%';
  clearAllTakes(); trackPhrase(idx);
}

function playPhrase(idx) {
  stopAllTakePlayback(); const s = sentences[idx];
  video.currentTime = s.start; video.playbackRate = speeds[speedIndex]; video.volume = 1; video.play();
}

function nextPhrase() {
  const skip = splitMode ? 2 : 1;
  const next = currentIndex + skip;
  if (next < sentences.length) { currentIndex = next; loopCount=0; showPhrase(currentIndex); playPhrase(currentIndex); }
}
function prevPhrase() {
  if (splitMode) { loopCount=0; showPhrase(currentIndex); playPhrase(currentIndex); return; }
  if (currentIndex > 0) { currentIndex--; loopCount=0; showPhrase(currentIndex); playPhrase(currentIndex); }
}
function replayPhrase() { loopCount=0; playPhrase(currentIndex); }

function seekToWord(wordIdx) {
  const s = sentences[currentIndex];
  if (!s.words || !s.words[wordIdx]) return;
  stopAllTakePlayback();
  video.currentTime = s.words[wordIdx].start;
  video.playbackRate = speeds[speedIndex]; video.volume = 1; video.play();
}

function handleSplit() {
  const nextIdx = currentIndex + 1;
  if (nextIdx >= sentences.length) return;
  const btn = document.getElementById('splitBtn');
  // Toggle off
  if (splitMode) {
    splitMode = false; btn.classList.remove('accent-btn');
    document.getElementById('splitLabel').textContent = 'Split';
    document.getElementById('splitNext').style.display = 'none';
    // Restore single phrase time
    const s = sentences[currentIndex];
    const sm = Math.floor(s.start/60), ss = Math.floor(s.start%60), em = Math.floor(s.end/60), es = Math.floor(s.end%60);
    document.getElementById('phraseTime').textContent = `${sm}:${String(ss).padStart(2,'0')} → ${em}:${String(es).padStart(2,'0')}`;
    return;
  }
  // Activate split
  splitMode = true;
  splitEndTime = sentences[nextIdx].end;
  btn.classList.add('accent-btn');
  document.getElementById('splitLabel').textContent = 'Split';
  // Show next phrase text below current
  const splitEl = document.getElementById('splitNext');
  const ns = sentences[nextIdx];
  if (ns.words && ns.words.length) {
    splitEl.innerHTML = ns.words.map((w, i) =>
      `<span class="word" onclick="seekToWordSplit(${i})">${w.text} </span>`
    ).join('');
  } else {
    splitEl.textContent = ns.text;
  }
  splitEl.style.display = '';
  // Update time display to show combined range
  const s = sentences[currentIndex];
  const sm = Math.floor(s.start/60), ss = Math.floor(s.start%60), em = Math.floor(ns.end/60), es = Math.floor(ns.end%60);
  document.getElementById('phraseTime').textContent = `${sm}:${String(ss).padStart(2,'0')} → ${em}:${String(es).padStart(2,'0')}`;
  // Replay from current phrase start, will play through both
  playPhrase(currentIndex);
}

function seekToWordSplit(wordIdx) {
  const ns = sentences[currentIndex + 1];
  if (!ns || !ns.words || !ns.words[wordIdx]) return;
  stopAllTakePlayback();
  video.currentTime = ns.words[wordIdx].start;
  video.playbackRate = speeds[speedIndex]; video.volume = 1; video.play();
}

function togglePause() {
  if (!video) return;
  if (!video.paused) { video.pause(); isPausedByUser = true; document.getElementById('pauseIcon').textContent = '▶'; document.getElementById('pauseLabel').textContent = 'Play'; }
  else if (isPausedByUser) { video.play(); }
  else { replayPhrase(); }
}

function toggleText() {
  textVisible = !textVisible;
  document.getElementById('phraseText').classList.toggle('dimmed', !textVisible);
  document.getElementById('toggleLabel').textContent = textVisible ? 'Hide' : 'Show';
}

function toggleTranslation() {
  translationVisible = !translationVisible;
  document.getElementById('ruBtn').classList.toggle('accent-btn', translationVisible);
  const s = sentences[currentIndex];
  const transEl = document.getElementById('phraseTranslation');
  if (s.translation && translationVisible) { transEl.textContent = s.translation; transEl.style.display = ''; }
  else { transEl.style.display = 'none'; }
}

function cycleSpeed() {
  speedIndex = (speedIndex+1) % speeds.length;
  document.getElementById('speedBtn').textContent = speeds[speedIndex]+'x';
  if (video) video.playbackRate = speeds[speedIndex];
}

function toggleLoop() {
  loopEnabled = !loopEnabled; loopCount = 0;
  const btn = document.getElementById('loopBtn');
  btn.textContent = loopEnabled ? `Loop: ${LOOP_MAX}x` : 'Loop: off';
  btn.classList.toggle('active', loopEnabled);
}

// --- REC / SHADOW ---
function handleRec() {
  if (isRecording) { stopRecording(); return; }
  if (recPreparing) return;
  if (takes.length >= MAX_TAKES) clearAllTakes();
  shadowMode = false; startRecFlow();
}
function handleShadow() {
  if (isRecording) { stopRecording(); return; }
  if (recPreparing) return;
  if (takes.length >= MAX_TAKES) clearAllTakes();
  shadowMode = true; startShadowFlow();
}

async function startRecFlow() {
  try { micStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch { alert('Mic denied'); return; }
  recPreparing = true;
  document.getElementById('recBtn').classList.add('preparing'); document.getElementById('recBtn').textContent = 'Listen...';
  stopAllTakePlayback();
  const s = sentences[currentIndex];
  video.currentTime = s.start; video.playbackRate = speeds[speedIndex]; video.volume = 1; video.play();
  setBadge('LISTEN', 'visible');
  function waitEnd() { if (video.currentTime >= s.end - 0.12) { video.pause(); doCountdown(2, false); return; } requestAnimationFrame(waitEnd); }
  requestAnimationFrame(waitEnd);
}

async function startShadowFlow() {
  try { micStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch { alert('Mic denied'); return; }
  recPreparing = true;
  document.getElementById('shadowBtn').classList.add('preparing'); document.getElementById('shadowBtn').textContent = 'Ready...';
  stopAllTakePlayback(); doCountdown(2, true);
}

function doCountdown(n, isShadow) {
  if (n <= 0) { if (isShadow) beginShadowRecording(); else beginRecording(); return; }
  setBadge(n + '...', 'visible countdown');
  if (isShadow) document.getElementById('shadowBtn').textContent = n + '...';
  else document.getElementById('recBtn').textContent = n + '...';
  setTimeout(() => doCountdown(n - 1, isShadow), 1000);
}

function beginRecording() {
  recPreparing = false; isRecording = true; shadowMode = false; recordedChunks = [];
  mediaRecorder = new MediaRecorder(micStream);
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => finishRecording('rec');
  mediaRecorder.start(); recStartTime = Date.now();
  document.getElementById('recBtn').textContent = '● REC'; document.getElementById('recBtn').classList.remove('preparing'); document.getElementById('recBtn').classList.add('rec-active');
  document.getElementById('stopBtn').style.display = '';
  const timer = document.getElementById('recTimer'); timer.style.display = ''; timer.className = 'rec-timer';
  setBadge('● REC', 'visible recording');
  recTimerInterval = setInterval(() => { timer.textContent = ((Date.now() - recStartTime) / 1000).toFixed(1) + 's'; }, 100);
}

function beginShadowRecording() {
  recPreparing = false; isRecording = true; shadowMode = true; recordedChunks = [];
  mediaRecorder = new MediaRecorder(micStream);
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => finishRecording('shadow');
  mediaRecorder.start(); recStartTime = Date.now();
  const s = sentences[currentIndex];
  video.currentTime = s.start; video.playbackRate = speeds[speedIndex]; video.volume = 1; video.play();
  document.getElementById('shadowBtn').textContent = '● SHADOW'; document.getElementById('shadowBtn').classList.remove('preparing'); document.getElementById('shadowBtn').classList.add('shadow-active');
  document.getElementById('stopBtn').style.display = '';
  const timer = document.getElementById('recTimer'); timer.style.display = ''; timer.className = 'rec-timer shadow-timer';
  setBadge('● SHADOW', 'visible shadow');
  recTimerInterval = setInterval(() => { timer.textContent = ((Date.now() - recStartTime) / 1000).toFixed(1) + 's'; }, 100);
}

function finishRecording(type) {
  const blob = new Blob(recordedChunks, { type: 'audio/webm' });
  const audio = new Audio(URL.createObjectURL(blob));
  const dur = (Date.now() - recStartTime) / 1000;
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  isRecording = false; clearInterval(recTimerInterval);
  takes.push({ audio, duration: dur, type }); trackRec(); renderTakes();
  const recBtn = document.getElementById('recBtn'), shadowBtn = document.getElementById('shadowBtn');
  if (takes.length >= MAX_TAKES) { recBtn.textContent = 'Reset'; recBtn.className = 'tool-btn has-rec'; shadowBtn.textContent = 'Reset'; shadowBtn.className = 'tool-btn has-rec'; }
  else { recBtn.textContent = 'Rec'; recBtn.className = 'tool-btn'; shadowBtn.textContent = 'Shadow'; shadowBtn.className = 'tool-btn'; }
  document.getElementById('stopBtn').style.display = 'none'; document.getElementById('recTimer').style.display = 'none';
  setBadge('SAVED', 'visible');
  setTimeout(() => playTake(takes.length - 1), 200);
}

function stopRecording() { if (isRecording && mediaRecorder) mediaRecorder.stop(); }

// --- TAKES ---
function renderTakes() {
  const area = document.getElementById('takesArea');
  const origDur = (sentences[currentIndex].end - sentences[currentIndex].start).toFixed(1);
  area.innerHTML = '';
  if (takes.length > 0) { const info = document.createElement('div'); info.className = 'takes-orig'; info.textContent = `Original: ${origDur}s`; area.appendChild(info); }
  takes.forEach((take, i) => {
    const row = document.createElement('div'); row.className = 'take-row'; row.id = 'take-row-' + i;
    const diff = (take.duration - parseFloat(origDur)).toFixed(1);
    const diffStr = diff > 0 ? `+${diff}` : diff;
    const diffColor = Math.abs(diff) < 0.5 ? 'var(--accent)' : (diff > 0 ? 'var(--orange)' : 'var(--text-dim)');
    const typeClass = take.type === 'shadow' ? 'shadow-type' : 'rec-type';
    const typeLabel = take.type === 'shadow' ? 'Shadow' : 'Rec';
    const barClass = take.type === 'shadow' ? 'shadow-fill' : 'rec-fill';
    let mixBtn = take.type === 'shadow' ? `<button class="take-mix-btn" id="take-mix-${i}" onclick="toggleMix(${i})">Mix</button>` : '';
    row.innerHTML = `<span class="take-num">${i+1} <span class="take-type ${typeClass}">${typeLabel}</span></span>
      <span class="take-time">${take.duration.toFixed(1)}s</span>
      <div class="take-bar"><div class="take-bar-fill ${barClass}" id="take-bar-${i}" style="width:0%"></div></div>
      <span class="take-time" style="color:${diffColor}">${diffStr}s</span>${mixBtn}
      <button class="take-btn" id="take-btn-${i}" onclick="toggleTake(${i})">▶</button>`;
    area.appendChild(row);
  });
}

function toggleTake(idx) { if (playingTakeIdx === idx && !mixPlaying) stopAllTakePlayback(); else playTake(idx); }
function playTake(idx) {
  stopAllTakePlayback(); const take = takes[idx]; if (!take) return;
  playingTakeIdx = idx; take.audio.currentTime = 0; take.audio.play();
  const btn = document.getElementById('take-btn-' + idx); if (btn) { btn.textContent = '■'; btn.classList.add('playing'); }
  takeProgressInterval = setInterval(() => { const bar = document.getElementById('take-bar-' + idx); if (bar && take.audio.duration) bar.style.width = (take.audio.currentTime / take.audio.duration * 100) + '%'; }, 50);
  take.audio.onended = () => stopAllTakePlayback();
}

function toggleMix(idx) {
  if (mixPlaying && playingTakeIdx === idx) { stopAllTakePlayback(); return; }
  stopAllTakePlayback(); const take = takes[idx]; if (!take || take.type !== 'shadow') return;
  mixPlaying = true; playingTakeIdx = idx;
  const s = sentences[currentIndex]; video.currentTime = s.start; video.playbackRate = speeds[speedIndex]; video.volume = 0.5; video.play();
  take.audio.currentTime = 0; take.audio.play();
  const mixBtn = document.getElementById('take-mix-' + idx); if (mixBtn) { mixBtn.textContent = '■ Mix'; mixBtn.classList.add('playing'); }
  takeProgressInterval = setInterval(() => { const bar = document.getElementById('take-bar-' + idx); if (bar && take.audio.duration) bar.style.width = (take.audio.currentTime / take.audio.duration * 100) + '%'; }, 50);
  take.audio.onended = () => { video.pause(); video.volume = 1; stopAllTakePlayback(); };
}

function stopAllTakePlayback() {
  clearInterval(takeProgressInterval); mixPlaying = false; if (video) video.volume = 1;
  takes.forEach((t, i) => { t.audio.pause(); t.audio.currentTime = 0;
    const btn = document.getElementById('take-btn-' + i); if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
    const bar = document.getElementById('take-bar-' + i); if (bar) bar.style.width = '0%';
    const mix = document.getElementById('take-mix-' + i); if (mix) { mix.textContent = 'Mix'; mix.classList.remove('playing'); }
  }); playingTakeIdx = -1;
}

function clearAllTakes() {
  stopAllTakePlayback(); takes.forEach(t => t.audio.pause()); takes = [];
  document.getElementById('takesArea').innerHTML = '';
  if (isRecording && mediaRecorder) mediaRecorder.stop();
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  isRecording = false; recPreparing = false; shadowMode = false; clearInterval(recTimerInterval);
  document.getElementById('recBtn').textContent = 'Rec'; document.getElementById('recBtn').className = 'tool-btn';
  document.getElementById('shadowBtn').textContent = 'Shadow'; document.getElementById('shadowBtn').className = 'tool-btn';
  document.getElementById('stopBtn').style.display = 'none'; document.getElementById('recTimer').style.display = 'none';
}

// --- COUNTDOWN TIMER ---
let cdInterval = null, cdTotalSec = 0, cdRemaining = 0, cdActiveMinutes = 0;

function toggleCountdown(minutes) {
  const btns = document.querySelectorAll('.cd-btn');
  if (cdInterval && cdActiveMinutes === minutes) { clearCountdown(); return; }
  if (cdInterval) clearInterval(cdInterval);
  cdActiveMinutes = minutes; cdTotalSec = minutes * 60; cdRemaining = cdTotalSec;
  btns.forEach(b => b.classList.remove('cd-running'));
  const activeBtn = [...btns].find(b => b.textContent === minutes + 'm');
  if (activeBtn) activeBtn.classList.add('cd-running');
  updateCdDisplay();
  cdInterval = setInterval(() => {
    cdRemaining--;
    if (cdRemaining <= 0) { cdRemaining = 0; clearInterval(cdInterval); cdInterval = null; updateCdDisplay(); cdDone(); return; }
    updateCdDisplay();
  }, 1000);
}

function updateCdDisplay() {
  const el = document.getElementById('cdDisplay');
  const fill = document.getElementById('cdFill');
  const m = Math.floor(cdRemaining / 60), s = cdRemaining % 60;
  el.textContent = `${m}:${String(s).padStart(2, '0')}`;
  const pct = cdTotalSec > 0 ? (cdRemaining / cdTotalSec * 100) : 0;
  fill.style.width = pct + '%';
  el.classList.remove('cd-warn', 'cd-done');
  fill.classList.remove('cd-warn-fill', 'cd-done-fill');
  if (cdRemaining <= 0) { el.classList.add('cd-done'); fill.classList.add('cd-done-fill'); }
  else if (cdRemaining <= 60) { el.classList.add('cd-warn'); fill.classList.add('cd-warn-fill'); }
}

function cdDone() {
  document.getElementById('cdDisplay').textContent = '0:00 ✓';
  document.querySelectorAll('.cd-btn').forEach(b => b.classList.remove('cd-running'));
  try {
    const ctx = new AudioContext();
    [0, 200, 400].forEach(delay => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; gain.gain.value = 0.15;
      osc.start(ctx.currentTime + delay / 1000);
      osc.stop(ctx.currentTime + delay / 1000 + 0.15);
    });
  } catch {}
}

function clearCountdown() {
  if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }
  cdActiveMinutes = 0; cdRemaining = 0; cdTotalSec = 0;
  document.getElementById('cdDisplay').textContent = '';
  document.getElementById('cdDisplay').classList.remove('cd-warn', 'cd-done');
  document.getElementById('cdFill').style.width = '0%';
  document.getElementById('cdFill').classList.remove('cd-warn-fill', 'cd-done-fill');
  document.querySelectorAll('.cd-btn').forEach(b => b.classList.remove('cd-running'));
}

// --- PROMPTER ---
let prompterActive = false, prompterMirrored = false, prompterRAF = null;

function openPrompter() {
  if (!sentences.length) return;
  prompterActive = true;
  // Pause main player
  if (video && !video.paused) video.pause();
  // Build all phrases
  const scroll = document.getElementById('prompterScroll');
  scroll.innerHTML = sentences.map((s, i) => {
    let html = `<div class="prompter-line" data-idx="${i}" onclick="prompterJumpTo(${i})">${s.text}`;
    if (s.translation && translationVisible) html += `<span class="prompter-translation">${s.translation}</span>`;
    html += `</div>`;
    return html;
  }).join('');
  document.getElementById('prompterOverlay').classList.add('open');
  // Disable auto-pause for continuous playback
  autoPauseEnabled = false;
  // Start tracking
  prompterRAF = requestAnimationFrame(prompterTick);
  prompterUpdateTime();
}

function closePrompter() {
  prompterActive = false;
  if (video && !video.paused) video.pause();
  document.getElementById('prompterOverlay').classList.remove('open');
  autoPauseEnabled = true;
  if (prompterRAF) cancelAnimationFrame(prompterRAF);
  // Sync back to current phrase
  showPhrase(currentIndex);
}

function prompterTogglePlay() {
  if (!video) return;
  if (video.paused) {
    video.playbackRate = speeds[speedIndex]; video.volume = 1; video.play();
    document.getElementById('prompterPlayBtn').textContent = '⏸ Pause';
  } else {
    video.pause();
    document.getElementById('prompterPlayBtn').textContent = '▶ Play';
  }
}

function prompterToggleMirror() {
  prompterMirrored = !prompterMirrored;
  document.getElementById('prompterScroll').classList.toggle('mirrored', prompterMirrored);
  document.getElementById('prompterMirrorBtn').classList.toggle('active', prompterMirrored);
}

function prompterJumpTo(idx) {
  if (!video || !sentences[idx]) return;
  video.currentTime = sentences[idx].start;
  video.playbackRate = speeds[speedIndex]; video.volume = 1; video.play();
  document.getElementById('prompterPlayBtn').textContent = '⏸ Pause';
}

function prompterTick() {
  if (!prompterActive) return;
  if (video && !video.paused) {
    const ct = video.currentTime;
    // Find current phrase
    let activeIdx = 0;
    for (let i = 0; i < sentences.length; i++) {
      if (ct >= sentences[i].start) activeIdx = i;
    }
    // Update highlights
    const lines = document.querySelectorAll('#prompterScroll .prompter-line');
    lines.forEach((el, i) => {
      el.classList.toggle('active', i === activeIdx);
      el.classList.toggle('done', i < activeIdx);
    });
    // Auto-scroll active line to center
    if (lines[activeIdx] && activeIdx !== currentIndex) {
      currentIndex = activeIdx;
      lines[activeIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    prompterUpdateTime();
  }
  prompterRAF = requestAnimationFrame(prompterTick);
}

function prompterUpdateTime() {
  if (!video) return;
  const ct = video.currentTime;
  const m = Math.floor(ct / 60), s = Math.floor(ct % 60);
  document.getElementById('prompterTime').textContent = `${m}:${String(s).padStart(2, '0')}`;
}

window.addEventListener('beforeunload', () => {
  const sec = getSessionSeconds();
  if (sec > 0) updateTodayStats({ minutes: Math.ceil(sec / 60), seconds: sec, phrases: sessionPhrasesVisited.size, recs: sessionRecCount });
});

document.addEventListener('visibilitychange', () => { if (document.hidden && video && !video.paused) video.pause(); });

document.addEventListener('keydown', (e) => {
  if (prompterActive) {
    if (e.key === 'Escape') closePrompter();
    else if (e.key === ' ') { e.preventDefault(); prompterTogglePlay(); }
    return;
  }
  if (document.getElementById('historyPanel').classList.contains('open')) { if (e.key === 'Escape') closeHistory(); return; }
  if (!document.getElementById('player').classList.contains('active')) return;
  switch(e.key) {
    case 'ArrowRight': nextPhrase(); break;
    case 'ArrowLeft': prevPhrase(); break;
    case 'ArrowUp': case 'ArrowDown': e.preventDefault(); replayPhrase(); break;
    case ' ': e.preventDefault(); togglePause(); break;
    case 'h': toggleText(); break;
    case 's': cycleSpeed(); break;
    case 'l': toggleLoop(); break;
    case 'r': handleRec(); break;
    case 'w': handleShadow(); break;
    case 'f': handleSplit(); break;
    case 't': if (hasTranslations) toggleTranslation(); break;
    case 'p': openPrompter(); break;
  }
});
</script>
